<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Book Details</title>
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.4.1/css/all.css">
	<style>
		body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .background-shapes div {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            z-index: 0;
        }

        .shape1 { width: 300px; height: 300px; top: -50px; left: -50px; }
        .shape2 { width: 200px; height: 200px; bottom: -50px; right: -50px; }

        .main-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 2.5rem;
            margin-top: 2rem;
            position: relative;
            z-index: 1;
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .detail-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 15px 15px 0 0;
            color: white;
            padding: 1.5rem;
            margin: -2.5rem -2.5rem 2rem -2.5rem;
        }

        .detail-title {
            font-weight: 700;
            margin-bottom: 0;
        }

        .detail-item {
            background: rgba(102, 126, 234, 0.05);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .detail-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .detail-item strong {
            color: #667eea;
            min-width: 120px;
            display: inline-block;
        }

        .list-group-custom {
            border-radius: 10px;
            border: 2px solid rgba(102, 126, 234, 0.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .list-group-item-custom {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .list-group-item-custom i {
            color: #667eea;
            width: 25px;
            text-align: center;
        }

        .section-title {
            color: #667eea;
            font-weight: 600;
            margin: 1.5rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid rgba(102, 126, 234, 0.2);
        }
	</style>
</head>
<body>
<div class="background-shapes">
	<div class="shape1"></div>
	<div class="shape2"></div>
</div>

<div th:insert="comman/header :: header"></div>

<div class="container">
	<div class="main-container">
		<div class="detail-header">
			<h2 class="detail-title">Book Details</h2>
		</div>

		<div class="row">
			<div class="col-md-6">
				<div class="detail-item">
					<strong>ISBN:</strong>
					<span th:text="${book.isbn}"></span>
				</div>
				<div class="detail-item">
					<strong>Name:</strong>
					<span th:text="${book.name}"></span>
				</div>
				<div class="detail-item">
					<strong>Serial Name:</strong>
					<span th:text="${book.serialName}"></span>
				</div>
				<div class="detail-item">
					<strong>Description:</strong>
					<span th:text="${book.description}"></span>
				</div>
				<div class="detail-item">
					<strong>Status:</strong>
					<span th:text="${book.status}"></span>
				</div>
			</div>

			<div class="col-md-6">
				<h4 class="section-title">
					<i class="fas fa-user-edit mr-2"></i>Authors
				</h4>
				<ul class="list-group list-group-custom">
					<li class="list-group-item-custom" th:each="author : ${book.authors}">
						<i class="fas fa-user"></i>
						<span th:text="${author.name}"></span>
					</li>
				</ul>

				<h4 class="section-title mt-4">
					<i class="fas fa-tag mr-2"></i>Categories
				</h4>
				<ul class="list-group list-group-custom">
					<li class="list-group-item-custom" th:each="category : ${book.categories}">
						<i class="fas fa-tag"></i>
						<span th:text="${category.name}"></span>
					</li>
				</ul>

				<h4 class="section-title mt-4">
					<i class="fas fa-building mr-2"></i>Publishers
				</h4>
				<ul class="list-group list-group-custom">
					<li class="list-group-item-custom" th:each="publisher : ${book.publishers}">
						<i class="fas fa-building"></i>
						<span th:text="${publisher.name}"></span>
					</li>
				</ul>
			</div>
		</div>
	</div>
</div>

<div th:insert="comman/footer :: footer"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>
</body>
</html>
